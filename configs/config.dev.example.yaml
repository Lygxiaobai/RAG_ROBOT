server:
  port: "8080"
  mode: "debug"

database:
  host: "localhost"
  port: 3306
  username: "root"
  password: "YOUR_DB_PASSWORD"
  dbname: "rag_robot"
  charset: "utf8mb4"
  maxOpenConns: 20
  maxIdleConns: 10
  connMaxLifetimeMinutes: 60
  connMaxIdleTimeMinutes: 30

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

openai:
  api_key: "YOUR_OPENAI_API_KEY"
  base_url: "https://api.openai.com/v1"
  model: "gpt-5.2"

qdrant:
  host: "localhost"
  port: 6333

log:
  level: "debug"
  format: "text"
  outputPath: "logs/app.log"
  maxSize: 100
  maxBackups: 3
  maxAge: 7
